name: Agent Forge CI

on:
  push: {}
  pull_request: {}

jobs:
  verify-agent-forge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python -m compileall agent_forge tests eval_cases examples

      - name: Single-agent demo
        run: python run_demo.py --mode single

      - name: Multi-agent demo
        run: python run_demo.py --mode multi

      - name: Workflow demo
        run: python run_demo.py --mode workflow

      - name: Unit tests
        run: python -m unittest discover tests

      - name: Eval benchmark
        run: python -m agent_forge.eval.eval_runner
